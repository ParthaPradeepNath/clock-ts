name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            suffix: darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            suffix: darwin-x64
          - target: bun-linux-x64-modern
            os: ubuntu-latest
            suffix: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun build src/index.tsx --compile --target=${{ matrix.target }} --outfile clock-ts-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: clock-ts-${{ matrix.suffix }}
          path: clock-ts-${{ matrix.suffix }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: clock-ts-*
          merge-multiple: true
      - name: Checksum
        run: |
          sha256sum clock-ts-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            clock-ts-*
            checksums.txt
          generate_release_notes: true
